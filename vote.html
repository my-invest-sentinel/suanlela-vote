<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>算了啦！老闆</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--R:#C0392B;--Y:#B7860B;--G:#1A6B35;--bg:#0C0C0C;--card:#181818;--bdr:#252525;--txt:#EAE7E0;}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,'Helvetica Neue',sans-serif;min-height:100svh;display:flex;align-items:center;justify-content:center;padding:24px 20px;}
.wrap{width:100%;max-width:400px;}
.pg{display:none;}
.pg.on{display:block;animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* 共用 */
.logo{font-size:10px;letter-spacing:.2em;color:#444;text-align:center;margin-bottom:8px;}
.title{font-size:24px;font-weight:900;text-align:center;margin-bottom:4px;}
.sub{font-size:13px;color:#666;text-align:center;margin-bottom:28px;}
.err{font-size:12px;color:var(--R);text-align:center;min-height:18px;margin:8px 0;}
.go{display:block;width:100%;padding:18px;background:var(--txt);color:#0C0C0C;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;}
.go:active{opacity:.8;}
.seat-tag{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--card);border:1px solid var(--bdr);border-radius:9px;margin-bottom:14px;}
.seat-tag .sn{font-size:22px;font-weight:800;}
.seat-tag .sl{font-size:10px;color:#555;}
.ep-row{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
.ep-chip{padding:3px 10px;border-radius:20px;font-size:10px;background:var(--card);color:#555;border:1px solid var(--bdr);}
.ep-chip.cur{background:var(--R);color:#fff;border-color:var(--R);font-weight:700;}
.q{font-size:15px;font-weight:700;text-align:center;color:#C8C5BC;line-height:1.55;margin-bottom:22px;min-height:48px;}
.done-wrap{text-align:center;padding:16px 0;}
.d-ico{font-size:68px;margin-bottom:12px;display:block;}
.d-clr{font-size:30px;font-weight:900;margin-bottom:6px;}
.d-msg{font-size:14px;color:#666;margin-bottom:28px;line-height:1.6;}
.chg{padding:10px 22px;background:transparent;border:1.5px solid var(--bdr);border-radius:8px;color:#666;font-size:12px;cursor:pointer;font-family:inherit;}
.wait-wrap{text-align:center;padding:20px 0;}
.w-ico{font-size:48px;margin-bottom:12px;display:block;}
.w-msg{font-size:15px;color:#666;}

/* 身份選擇 */
.id-btns{display:flex;flex-direction:column;gap:10px;margin-bottom:0;}
.id-btn{width:100%;padding:22px 20px;border:1.5px solid var(--bdr);border-radius:14px;background:var(--card);color:var(--txt);display:flex;align-items:center;gap:14px;cursor:pointer;font-family:inherit;transition:all .15s;}
.id-btn:active{transform:scale(.98);}
.id-btn .ico{font-size:32px;flex-shrink:0;}
.id-btn .tx{display:flex;flex-direction:column;align-items:flex-start;}
.id-btn .mn{font-size:16px;font-weight:800;}
.id-btn .sb{font-size:12px;color:#666;margin-top:3px;}
.id-btn.shop{border-color:#7D1ADB;}
.id-btn.audience{border-color:#1A6B35;}

/* 座位輸入（觀眾） */
.lbl{font-size:11px;color:#666;margin-bottom:7px;letter-spacing:.05em;}
.seat-in{display:block;width:100%;padding:16px;background:var(--card);border:1.5px solid var(--bdr);border-radius:12px;color:var(--txt);font-size:32px;font-weight:700;text-align:center;letter-spacing:.1em;outline:none;font-family:inherit;}
.seat-in:focus{border-color:#555;}
.hint{font-size:11px;color:#444;text-align:center;margin-top:6px;}

/* 店家選擇 */
.shop-list{display:flex;flex-direction:column;gap:8px;}
.shop-btn{width:100%;padding:16px 18px;border:1.5px solid var(--bdr);border-radius:12px;background:var(--card);color:var(--txt);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;text-align:left;display:flex;align-items:center;gap:12px;transition:all .15s;}
.shop-btn:active{transform:scale(.98);}
.shop-btn .shop-ico{font-size:20px;flex-shrink:0;}
.shop-btn.selected{border-color:#7D1ADB;background:rgba(125,26,219,.12);color:#CC88FF;}

/* 搶答頁（店家） */
.buzz-shopname{font-size:28px;font-weight:900;text-align:center;margin-bottom:6px;color:#CC88FF;}
.buzz-shoptype{font-size:12px;color:#666;text-align:center;margin-bottom:20px;}
.buzz-countdown{font-size:56px;font-weight:900;text-align:center;color:#E74C3C;margin-bottom:8px;line-height:1;}
.buzz-status{font-size:13px;color:#666;text-align:center;margin-bottom:20px;min-height:20px;}
.buzz-btn{width:100%;padding:32px 16px;border:none;border-radius:16px;background:#C0392B;color:#fff;font-size:24px;font-weight:900;cursor:pointer;font-family:inherit;letter-spacing:.04em;transition:transform .1s;}
.buzz-btn:active{transform:scale(.96);}
.buzz-btn:disabled{background:#333;color:#666;cursor:default;transform:none;}

/* 紅黃綠投票 */
.vlist{display:flex;flex-direction:column;gap:10px;}
.vbtn{width:100%;padding:22px 16px;border:none;border-radius:14px;display:flex;align-items:center;gap:13px;cursor:pointer;font-family:inherit;user-select:none;}
.vbtn:active{transform:scale(.97);}
.vbtn.r{background:var(--R);color:#fff;}
.vbtn.y{background:var(--Y);color:#F5DFA0;}
.vbtn.g{background:var(--G);color:#A8E6C0;}
.ico{font-size:26px;flex-shrink:0;}
.tx{display:flex;flex-direction:column;align-items:flex-start;}
.mn{font-size:17px;font-weight:800;}
.sb{font-size:11px;opacity:.75;font-weight:400;margin-top:2px;}

/* 單選（籌碼/五角色） */
.slist{display:flex;flex-direction:column;gap:8px;}
.sbtn{width:100%;padding:16px 18px;border:1.5px solid var(--bdr);border-radius:12px;background:var(--card);color:var(--txt);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;text-align:left;display:flex;align-items:center;gap:12px;transition:all .15s;}
.sbtn:active{transform:scale(.98);}
.sbtn.selected{border-color:var(--G);background:rgba(26,107,53,.15);color:#A8E6C0;}
.sbtn .s-ico{font-size:20px;flex-shrink:0;}
.sbtn .s-tx{display:flex;flex-direction:column;}
.sbtn .s-mn{font-size:15px;font-weight:700;}
.sbtn .s-sb{font-size:11px;color:#666;margin-top:2px;}
.submit-btn{width:100%;padding:16px;background:var(--G);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:12px;opacity:.4;}
.submit-btn.ready{opacity:1;}
.submit-btn:active{opacity:.8;}
</style>
</head>
<body>
<div class="wrap">

<!-- P0: 選身份 -->
<div class="pg on" id="pgIdentity">
  <div class="logo">南投戲院 · 算了啦！老闆</div>
  <div class="title">請選擇你的身份</div>
  <div class="sub" style="margin-bottom:24px;">2026年6月16日</div>
  <div class="id-btns">
    <button class="id-btn shop" onclick="goShop()">
      <span class="ico">🏪</span>
      <div class="tx">
        <span class="mn">我是店家</span>
        <span class="sb">搶答、回應市場反應</span>
      </div>
    </button>
    <button class="id-btn audience" onclick="goAudience()">
      <span class="ico">👥</span>
      <div class="tx">
        <span class="mn">我是觀眾</span>
        <span class="sb">投票、給店家市場反饋</span>
      </div>
    </button>
  </div>
</div>

<!-- P1a: 店家選擇 -->
<div class="pg" id="pgShopSel">
  <div class="logo">店家入口</div>
  <div class="title">你是哪家店？</div>
  <div class="sub">選擇後即可開始搶答</div>
  <div class="shop-list">
    <button class="shop-btn" onclick="selectShop('靜日香研',this)"><span class="shop-ico">🍵</span>靜日香研</button>
    <button class="shop-btn" onclick="selectShop('胖昇',this)"><span class="shop-ico">🍖</span>胖昇</button>
    <button class="shop-btn" onclick="selectShop('新協泰米行',this)"><span class="shop-ico">🌾</span>新協泰米行</button>
    <button class="shop-btn" onclick="selectShop('九尖茶廠',this)"><span class="shop-ico">🍃</span>九尖茶廠</button>
    <button class="shop-btn" onclick="selectShop('波嶼',this)"><span class="shop-ico">🌊</span>波嶼</button>
    <button class="shop-btn" onclick="selectShop('紙布家',this)"><span class="shop-ico">📄</span>紙布家</button>
    <button class="shop-btn" onclick="selectShop('嘉禮慕華',this)"><span class="shop-ico">🎋</span>嘉禮慕華</button>
    <button class="shop-btn" onclick="selectShop('馨眠',this)"><span class="shop-ico">😴</span>馨眠</button>
    <button class="shop-btn" onclick="selectShop('樸樂咖啡',this)"><span class="shop-ico">☕</span>樸樂咖啡</button>
    <button class="shop-btn" onclick="selectShop('安餃子',this)"><span class="shop-ico">🥟</span>安餃子</button>
    <button class="shop-btn" onclick="selectShop('九湯屋',this)"><span class="shop-ico">🍜</span>九湯屋</button>
  </div>
</div>

<!-- P1b: 觀眾座位輸入 -->
<div class="pg" id="pgSeat">
  <div class="logo">觀眾入口</div>
  <div class="title">市場觀察團</div>
  <div class="sub">輸入座位號碼，加入市場反應</div>
  <div class="lbl">你的座位號碼</div>
  <input class="seat-in" id="sIn" type="tel" placeholder="03-07" maxlength="6"
    autocomplete="off" oninput="fmt(this)" onkeydown="if(event.key==='Enter')goSeat()">
  <div class="hint">格式：排號 - 欄號　例如 01-01、05-12</div>
  <div class="err" id="err"></div>
  <button class="go" onclick="goSeat()">進入投票 →</button>
</div>

<!-- P2: 店家搶答 -->
<div class="pg" id="pgBuzz">
  <div class="seat-tag">
    <div><div class="sn" id="buzzShopName">—</div><div class="sl">我的店</div></div>
  </div>
  <div class="buzz-countdown" id="buzzCountdown">—</div>
  <div class="buzz-status" id="buzzStatus">等待搶答開放中…</div>
  <button class="buzz-btn" id="buzzBtn" onclick="doBuzz()" disabled>
    等待搶答開放…
  </button>
  <div style="margin-top:16px;text-align:center;">
    <button style="padding:8px 16px;background:transparent;border:1px solid var(--bdr);border-radius:6px;color:#555;font-size:11px;cursor:pointer;font-family:inherit;" onclick="pg('pgShopSel')">換一家店</button>
  </div>
</div>

<!-- P3: 觀眾紅黃綠投票 -->
<div class="pg" id="pgVote">
  <div class="seat-tag">
    <div><div class="sn" id="dSeat">—</div><div class="sl">我的座位</div></div>
  </div>
  <div class="ep-row" id="epRow"></div>
  <div class="q" id="qTxt">等待投票開始…</div>
  <div class="vlist">
    <button class="vbtn r" onclick="vote('red')">
      <span class="ico">🔴</span><div class="tx"><span class="mn">紅牌</span><span class="sb" id="rSub">不懂，不想靠近</span></div>
    </button>
    <button class="vbtn y" onclick="vote('yellow')">
      <span class="ico">🟡</span><div class="tx"><span class="mn">黃牌</span><span class="sb" id="ySub">有點懂，還差一點</span></div>
    </button>
    <button class="vbtn g" onclick="vote('green')">
      <span class="ico">🟢</span><div class="tx"><span class="mn">綠牌</span><span class="sb" id="gSub">懂了，有興趣</span></div>
    </button>
  </div>
</div>

<!-- P4: 單選（籌碼/五角色） -->
<div class="pg" id="pgSingle">
  <div class="seat-tag">
    <div><div class="sn" id="dSeat2">—</div><div class="sl">我的座位</div></div>
  </div>
  <div class="ep-row" id="epRow2"></div>
  <div class="q" id="qSingle">請選擇</div>
  <div class="slist" id="singleList"></div>
  <button class="submit-btn" id="submitBtn" onclick="submitSingle()">確認送出</button>
</div>

<!-- P5: 已完成 -->
<div class="pg" id="pgDone">
  <div class="done-wrap">
    <span class="d-ico" id="dIco">✅</span>
    <div class="d-clr" id="dClr">完成</div>
    <div class="d-msg" id="dMsg">謝謝你的參與！</div>
    <button class="chg" onclick="chg()">更改選擇</button>
  </div>
</div>

<!-- P6: 等待 -->
<div class="pg" id="pgWait">
  <div class="wait-wrap">
    <span class="w-ico">⏳</span>
    <div class="w-msg" id="wMsg">等待開始…</div>
  </div>
</div>

</div>
<script>
const DB='https://suanlela-vote-default-rtdb.firebaseio.com';
const CHIPS=['EP1 品牌','EP2 商業','EP3 行銷','EP4 商品'];
const EP_Q={
  'ep1-pre':'你聽得懂這家店在賣什麼嗎？',
  'ep1-post':'修正後，你更清楚這家店了嗎？',
  'ep2-pre':'你知道要怎麼開始消費嗎？',
  'ep2-post':'修正後，你知道怎麼靠近了嗎？',
  'ep2-token':'如果你有一次消費機會，你最想給哪一家？',
  'ep3-pre':'這段內容出現在你手機上，你會留下來還是滑走？',
  'ep3-post':'修正後，你願意停下來看嗎？',
  'ep4-pre':'你知道這個商品為什麼值得買嗎？',
  'ep4-post':'修正後，你清楚怎麼買了嗎？',
  'ep4-role':'你覺得這個商品在店裡比較像哪個角色？',
};
const EP_OPT={
  'ep1-pre':['聽不懂，不知道在賣什麼','大概懂，但沒有被吸引','聽得懂，想進一步了解'],
  'ep1-post':['還是聽不懂','有進步但還差一點','清楚多了'],
  'ep2-pre':['不知道怎麼開始消費','有點懂，但還沒想去','知道怎麼買，有興趣'],
  'ep2-post':['還是不清楚','稍微清楚了','清楚多了'],
  'ep3-pre':['直接滑走','停下來看完','想按讚、分享或行動'],
  'ep3-post':['還是滑走','願意停下來看','很想採取行動'],
  'ep4-pre':['不知道為什麼要買','有點懂，但沒被說服','知道誰適合買、怎麼買'],
  'ep4-post':['還是不清楚','稍微清楚了','清楚多了'],
};
const ROLES=[
  {id:'引流品',ico:'🎯',desc:'讓客人第一次靠近'},
  {id:'主力品',ico:'💰',desc:'穩定創造營收'},
  {id:'加購品',ico:'➕',desc:'提高客單價'},
  {id:'回購品',ico:'🔄',desc:'讓客人再次回來'},
  {id:'形象品',ico:'✨',desc:'建立品牌記憶'},
];

// 狀態
let role=''; // 'shop' or 'audience'
let myShop='';
let seat='';
let rid=null, pollT=null;
let singleType='', singleSelected='';
let hasBuzzed=false;
let buzzTimerIv=null;

// ── 頁面切換 ──
function pg(id){
  ['pgIdentity','pgShopSel','pgSeat','pgBuzz','pgVote','pgSingle','pgDone','pgWait']
    .forEach(p=>document.getElementById(p).classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

// ── 身份選擇 ──
function goShop(){ role='shop'; pg('pgShopSel'); }
function goAudience(){ role='audience'; pg('pgSeat'); }

// ── 店家選擇 ──
function selectShop(name, btn){
  myShop=name;
  document.querySelectorAll('.shop-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('buzzShopName').textContent=myShop;
  setTimeout(()=>{ pg('pgBuzz'); startShopPoll(); }, 300);
}

// ── 觀眾座位輸入 ──
function fmt(el){let v=el.value.replace(/[^0-9]/g,'');if(v.length>2)v=v.slice(0,2)+'-'+v.slice(2,4);el.value=v;}
function goSeat(){
  const v=document.getElementById('sIn').value.trim();
  const m=v.match(/^(\d{2})-(\d{2,3})$/);
  if(!m){document.getElementById('err').textContent='格式錯誤，例如：03-07';return;}
  const r=parseInt(m[1]),c=parseInt(m[2]);
  if(r<1||r>8||c<1||c>30){document.getElementById('err').textContent='找不到這個座位';return;}
  seat=v;
  document.getElementById('err').textContent='';
  document.getElementById('dSeat').textContent=seat;
  document.getElementById('dSeat2').textContent=seat;
  pg('pgVote');
  startAudiencePoll();
}

// ── 店家搶答 Poll ──
function startShopPoll(){
  shopPoll();
  if(pollT) clearInterval(pollT);
  pollT=setInterval(shopPoll,2000);
}

async function shopPoll(){
  try{
    const res=await fetch(`${DB}/round.json`);
    const d=await res.json();
    if(!d||!d.active||d.phase!=='buzz'){
      // 不是搶答輪次
      const btn=document.getElementById('buzzBtn');
      const st=document.getElementById('buzzStatus');
      const cd=document.getElementById('buzzCountdown');
      if(btn){ btn.disabled=true; btn.textContent='等待搶答開放…'; btn.style.background='#333'; btn.style.color='#666'; }
      if(st) st.textContent='等待搶答開放中…';
      if(cd) cd.textContent='—';
      if(buzzTimerIv){ clearInterval(buzzTimerIv); buzzTimerIv=null; }
      if(rid&&d&&d.id!==rid){ hasBuzzed=false; }
      return;
    }
    // 搶答開放
    if(d.id!==rid){
      rid=d.id;
      hasBuzzed=false;
      openBuzz(d.totalSec||10);
    }
  }catch(e){}
}

function openBuzz(totalSec){
  const btn=document.getElementById('buzzBtn');
  const st=document.getElementById('buzzStatus');
  if(!hasBuzzed){
    btn.disabled=false;
    btn.textContent='⚡ 我要搶答！';
    btn.style.background='#C0392B';
    btn.style.color='#fff';
  }
  st.textContent='搶答開放中！';
  // 倒數
  if(buzzTimerIv) clearInterval(buzzTimerIv);
  let sec=totalSec;
  const cd=document.getElementById('buzzCountdown');
  if(cd) cd.textContent=sec+'s';
  buzzTimerIv=setInterval(()=>{
    sec--;
    if(cd) cd.textContent=sec>0?sec+'s':'時間到！';
    if(sec<=0){
      clearInterval(buzzTimerIv);
      if(!hasBuzzed){
        btn.disabled=true;
        btn.textContent='搶答結束';
        btn.style.background='#333';
        btn.style.color='#666';
        if(st) st.textContent='本輪搶答已結束';
      }
    }
  },1000);
}

async function doBuzz(){
  if(hasBuzzed||!myShop||!rid) return;
  hasBuzzed=true;
  const btn=document.getElementById('buzzBtn');
  const st=document.getElementById('buzzStatus');
  btn.disabled=true;
  btn.textContent='✅ 已搶答！';
  btn.style.background='#1A6B35';
  if(st) st.textContent='搶答已送出，等待主持人確認';
  try{
    const key=myShop.replace(/[^a-z0-9]/gi,'_');
    await fetch(`${DB}/votes/${rid}/${key}.json`,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({shop:myShop, ts:Date.now(), type:'buzz'})
    });
  }catch(e){
    hasBuzzed=false;
    btn.disabled=false;
    btn.textContent='⚡ 我要搶答！';
    if(st) st.textContent='送出失敗，請重試';
  }
}

// ── 觀眾投票 Poll ──
function startAudiencePoll(){
  audiencePoll();
  if(pollT) clearInterval(pollT);
  pollT=setInterval(audiencePoll,2500);
}

async function audiencePoll(){
  try{
    const res=await fetch(`${DB}/round.json`);
    const d=await res.json();
    if(!d||!d.active||d.phase==='buzz'){
      document.getElementById('wMsg').textContent='等待投票開始…';
      if(rid){ pg('pgWait'); }
      rid=null; return;
    }
    if(d.id!==rid){
      rid=d.id;
      singleSelected='';
      if(d.phase==='token'){ setupToken(d); pg('pgSingle'); }
      else if(d.phase==='role'){ setupRole(d); pg('pgSingle'); }
      else { updUI(d); pg('pgVote'); }
    }
  }catch(e){}
}

function updUI(d){
  const k=(d.ep||'ep1')+'-'+(d.phase||'pre');
  document.getElementById('qTxt').textContent=EP_Q[k]||'請投票';
  const o=EP_OPT[k]||['紅牌','黃牌','綠牌'];
  document.getElementById('rSub').textContent=o[0];
  document.getElementById('ySub').textContent=o[1];
  document.getElementById('gSub').textContent=o[2];
  const n=parseInt((d.ep||'ep1').replace('ep',''))-1;
  const chips=CHIPS.map((l,i)=>`<span class="ep-chip${i===n?' cur':''}">${l}</span>`).join('');
  document.getElementById('epRow').innerHTML=chips;
  document.getElementById('epRow2').innerHTML=chips;
}

// 籌碼
function setupToken(d){
  singleType='token'; singleSelected='';
  const shops=['靜日香研','胖昇','新協泰米行','九尖茶廠','波嶼','紙布家','嘉禮慕華','馨眠','樸樂咖啡','安餃子','九湯屋'];
  document.getElementById('qSingle').textContent=EP_Q['ep2-token'];
  const list=document.getElementById('singleList'); list.innerHTML='';
  shops.forEach(s=>{
    const btn=document.createElement('button');
    btn.className='sbtn';
    btn.innerHTML=`<span class="s-ico">🏪</span><div class="s-tx"><span class="s-mn">${s}</span></div>`;
    btn.onclick=()=>selSingle(s,btn);
    list.appendChild(btn);
  });
  document.getElementById('submitBtn').className='submit-btn';
  const n=1;
  document.getElementById('epRow2').innerHTML=CHIPS.map((l,i)=>`<span class="ep-chip${i===n?' cur':''}">${l}</span>`).join('');
}

// 五角色
function setupRole(d){
  singleType='role'; singleSelected='';
  const shopName=d.shop||'這個商品';
  document.getElementById('qSingle').textContent=`${shopName}的主打商品，你覺得比較像哪個角色？`;
  const list=document.getElementById('singleList'); list.innerHTML='';
  ROLES.forEach(r=>{
    const btn=document.createElement('button');
    btn.className='sbtn';
    btn.innerHTML=`<span class="s-ico">${r.ico}</span><div class="s-tx"><span class="s-mn">${r.id}</span><span class="s-sb">${r.desc}</span></div>`;
    btn.onclick=()=>selSingle(r.id,btn);
    list.appendChild(btn);
  });
  document.getElementById('submitBtn').className='submit-btn';
  const n=3;
  document.getElementById('epRow2').innerHTML=CHIPS.map((l,i)=>`<span class="ep-chip${i===n?' cur':''}">${l}</span>`).join('');
}

function selSingle(val,btn){
  singleSelected=val;
  document.querySelectorAll('#singleList .sbtn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('submitBtn').className='submit-btn ready';
}

async function submitSingle(){
  if(!singleSelected||!seat||!rid) return;
  try{
    await fetch(`${DB}/votes/${rid}/${seat.replace('-','_')}.json`,{
      method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({choice:singleSelected,type:singleType,seat,ts:Date.now()})
    });
    document.getElementById('dIco').textContent=singleType==='token'?'🪙':'🏷';
    document.getElementById('dClr').textContent=singleType==='token'?'籌碼投出！':'角色選定！';
    document.getElementById('dMsg').innerHTML=singleType==='token'
      ?`你把籌碼投給了<br><strong>${singleSelected}</strong>`
      :`你覺得這個商品是<br><strong>${singleSelected}</strong>`;
    pg('pgDone');
  }catch(e){alert('送出失敗，請重試');}
}

// 觀眾紅黃綠
async function vote(color){
  if(!seat||!rid) return;
  try{
    await fetch(`${DB}/votes/${rid}/${seat.replace('-','_')}.json`,{
      method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({color,seat,ts:Date.now()})
    });
    const ico={red:'🔴',yellow:'🟡',green:'🟢'}[color];
    const nm={red:'紅牌',yellow:'黃牌',green:'綠牌'}[color];
    const msg={
      red:'你的誠實是給店家最好的禮物。\n紅牌不是傷害，是市場給他的提醒。',
      yellow:'謝謝！黃牌代表店家差一步就能說服你。',
      green:'謝謝！綠牌代表這家店成功傳遞了價值。'
    }[color];
    document.getElementById('dIco').textContent=ico;
    document.getElementById('dClr').textContent=nm;
    document.getElementById('dMsg').innerHTML=msg.replace('\n','<br>');
    pg('pgDone');
  }catch(e){alert('投票失敗，請重試');}
}

function chg(){
  singleSelected='';
  if(role==='shop') pg('pgBuzz');
  else if(singleType) pg('pgSingle');
  else pg('pgVote');
}
</script>
