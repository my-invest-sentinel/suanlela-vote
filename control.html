<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>控制台｜算了啦！老闆</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--R:#C0392B;--Y:#B7860B;--G:#1A6B35;--Rl:#E74C3C;--Yl:#E2A800;--Gl:#27AE60;--bg:#080808;--panel:#0F0F0F;--card:#161616;--bdr:#202020;--txt:#EAE7E0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Helvetica Neue',Arial,sans-serif;}
.top{height:42px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:var(--panel);border-bottom:1px solid var(--bdr);flex-shrink:0;gap:8px;}
.tp-title{font-size:12px;font-weight:700;white-space:nowrap;}
.ep-row,.ph-row{display:flex;gap:3px;}
.ep-btn,.ph-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--bdr);background:transparent;color:#555;font-size:10px;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap;}
.ep-btn.on{background:var(--R);border-color:var(--R);color:#fff;font-weight:700;}
.ph-btn.on{background:#1A3A5C;border-color:#1A3A5C;color:#7AB8F5;font-weight:700;}
.live{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--Gl);}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--Gl);animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.body{display:flex;height:calc(100vh - 42px);}

/* LEFT */
.left{width:250px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--bdr);overflow-y:auto;padding:7px;display:flex;flex-direction:column;gap:6px;}
.sec{background:var(--card);border-radius:6px;padding:8px 10px;}
.slbl{font-size:9px;color:#3a3a3a;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;}

/* Shop selector */
.shop-sel-row{display:flex;gap:4px;align-items:center;margin-bottom:6px;}
.shop-sel{flex:1;padding:6px 8px;background:#1a1a1a;border:1px solid var(--bdr);border-radius:5px;color:var(--txt);font-size:11px;font-family:inherit;outline:none;}
.shop-sel:focus{border-color:#555;}
.current-shop{padding:7px 10px;border-radius:5px;font-size:11px;font-weight:700;text-align:center;background:rgba(26,107,53,.15);border:1px solid rgba(39,174,96,.3);color:var(--Gl);}

/* Round */
.rs{padding:6px 9px;border-radius:5px;font-size:10px;text-align:center;font-weight:600;margin-bottom:5px;}
.rs-idle{background:#1a1a1a;border:1px solid var(--bdr);color:#3a3a3a;}
.rs-live{background:rgba(26,107,53,.15);border:1px solid rgba(39,174,96,.3);color:var(--Gl);}
.rbtns{display:flex;flex-direction:column;gap:4px;}
.rbtn{padding:9px;border:none;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.rb-go{background:var(--G);color:#fff;}
.rb-stop{background:#222;color:#777;}
.rb-reset{background:#2A1040;color:#CC88FF;}

/* Stats */
.sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;}
.si{background:#1a1a1a;border-radius:5px;padding:7px 4px;text-align:center;}
.sn{font-size:24px;font-weight:800;line-height:1;}
.sn.r{color:var(--Rl);}.sn.y{color:var(--Yl);}.sn.g{color:var(--Gl);}
.sl{font-size:9px;color:#3a3a3a;margin-top:2px;}
.rate-box{background:#1a1a1a;border-radius:5px;padding:7px;text-align:center;margin-top:4px;}
.rb-num{font-size:26px;font-weight:800;color:var(--Yl);line-height:1;}
.rb-sub{font-size:9px;color:#3a3a3a;margin-top:2px;}
.voted-ct{font-size:9px;color:#3a3a3a;text-align:center;margin-top:4px;}

/* Store results table */
.store-results{margin-top:4px;}
.sr-row{display:flex;align-items:center;gap:5px;padding:3px 0;border-bottom:1px solid #1a1a1a;font-size:10px;}
.sr-row:last-child{border:none;}
.sr-name{flex:1;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sr-pre{min-width:38px;text-align:center;color:#555;}
.sr-post{min-width:38px;text-align:center;color:#555;}
.sr-diff{min-width:38px;text-align:center;font-weight:700;}
.sr-diff.up{color:var(--Gl);}
.sr-diff.down{color:var(--Rl);}
.sr-hd{color:#3a3a3a !important;font-size:8px;}

/* Timer */
.td{font-size:42px;font-weight:800;text-align:center;line-height:1;padding:3px 0;}
.td.w{color:var(--Yl);}.td.d{color:var(--Rl);animation:dp .5s infinite alternate;}
@keyframes dp{from{opacity:1}to{opacity:.3}}
.tpre{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:4px;}
.tp{padding:4px 0;border-radius:3px;border:1px solid var(--bdr);background:#1a1a1a;color:#666;font-size:10px;cursor:pointer;text-align:center;font-family:inherit;}
.tbtns{display:grid;grid-template-columns:2fr 1fr 1fr;gap:3px;}
.tbtn{padding:7px;border:none;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;}
.tb-go{background:var(--G);color:#fff;}.tb-pa{background:var(--Y);color:#000;}.tb-rs{background:#2a2a2a;color:#888;}
.tqin{width:100%;padding:4px 6px;background:#1a1a1a;border:1px solid var(--bdr);border-radius:4px;color:var(--txt);font-size:10px;font-family:inherit;outline:none;margin-top:4px;}

/* Display */
.dg{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.dbtn{padding:7px 3px;border-radius:5px;border:1px solid var(--bdr);background:#1a1a1a;color:#555;font-size:10px;cursor:pointer;text-align:center;font-family:inherit;line-height:1.3;transition:all .12s;}
.dbtn:hover{background:#222;color:#ccc;}

/* Compare selector */
.cmp-sel-row{display:flex;gap:4px;margin-bottom:4px;}
.cmp-sel{flex:1;padding:5px 7px;background:#1a1a1a;border:1px solid var(--bdr);border-radius:4px;color:var(--txt);font-size:10px;font-family:inherit;outline:none;}

/* Unlock */
.sel{width:100%;padding:5px 7px;background:#1a1a1a;border:1px solid var(--bdr);border-radius:4px;color:var(--txt);font-size:10px;font-family:inherit;outline:none;margin-bottom:4px;}
.cb{width:100%;padding:7px;background:var(--Y);color:#0C0C0C;border:none;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:2px;}

/* Shop scores */
.shr{display:flex;align-items:center;gap:4px;padding:4px 0;border-bottom:1px solid #1a1a1a;}
.shr:last-child{border:none;}
.shnm{flex:1;font-size:10px;color:#777;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.shin{width:44px;padding:2px 4px;background:#1a1a1a;border:1px solid var(--bdr);border-radius:3px;color:#fff;font-size:11px;text-align:center;font-family:inherit;outline:none;}
.shtot{font-size:11px;font-weight:700;color:var(--Yl);min-width:26px;text-align:right;}

/* SEAT MAP */
.map-area{flex:1;overflow:auto;padding:12px;background:var(--bg);}
.map-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px;}
.map-title{font-size:11px;color:#3a3a3a;}
.legend{display:flex;gap:10px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:4px;font-size:9px;color:#3a3a3a;}
.ld{width:9px;height:9px;border-radius:2px;}
.smap-wrap{background:var(--panel);border-radius:9px;padding:14px 12px 10px;overflow-x:auto;}
.smap{display:flex;flex-direction:column;gap:2px;min-width:max-content;}
.s-row{display:flex;align-items:center;gap:0;}
.rnum{font-size:8px;color:#2a2a2a;width:20px;text-align:right;padding-right:5px;flex-shrink:0;}
.seat{width:30px;height:22px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:600;cursor:pointer;transition:background .3s,box-shadow .25s;border:1px solid transparent;user-select:none;flex-shrink:0;}
.seat-ph{width:30px;height:22px;flex-shrink:0;} /* placeholder空位 */
.seat-gap{width:10px;height:22px;flex-shrink:0;} /* 走道 */
.seat.gray{background:#1e1e1e;color:#333;border-color:#252525;cursor:default;}
.seat.idle{background:#1a1a1a;color:#2a2a2a;border-color:#222;}
.seat.voted-red{background:var(--R);color:#fff;box-shadow:0 0 7px rgba(192,57,43,.55);border-color:var(--Rl);}
.seat.voted-yellow{background:#7A5800;color:#FFD54F;box-shadow:0 0 7px rgba(183,134,11,.45);border-color:var(--Yl);}
.seat.voted-green{background:var(--G);color:#A8E6C0;box-shadow:0 0 7px rgba(26,107,53,.55);border-color:var(--Gl);}
.seat.idle:hover{background:#252525;border-color:#333;}
.screen-lbl{text-align:center;background:#111;border:1px solid #1a1a1a;border-radius:5px;padding:6px;font-size:9px;color:#2a2a2a;letter-spacing:.15em;margin-top:8px;}
.col-lbl-row{display:flex;align-items:center;margin-bottom:2px;}
.col-lbl-offset{width:20px;padding-right:5px;flex-shrink:0;}
.col-lbl{width:30px;text-align:center;font-size:7px;color:#2a2a2a;flex-shrink:0;}
.col-lbl-ph{width:30px;flex-shrink:0;}
.col-lbl-gap{width:10px;flex-shrink:0;}

/* Manual vote popup */
.mvpop{display:none;position:fixed;background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:10px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.6);}
.mvpop.on{display:flex;gap:5px;}
.mvbtn{padding:8px 12px;border:none;border-radius:5px;font-size:13px;cursor:pointer;}
.mv-r{background:var(--R);color:#fff;}.mv-y{background:var(--Y);color:#FFD54F;}.mv-g{background:var(--G);color:#A8E6C0;}.mv-x{background:#333;color:#999;}
</style>
</head>
<body>

<div class="top">
  <div class="tp-title">《算了啦！老闆》控制台</div>
  <div class="ep-row">
    <button class="ep-btn on" id="ep1t" onclick="selEP(1)">EP1 品牌</button>
    <button class="ep-btn" id="ep2t" onclick="selEP(2)">EP2 商業</button>
    <button class="ep-btn" id="ep3t" onclick="selEP(3)">EP3 行銷</button>
    <button class="ep-btn" id="ep4t" onclick="selEP(4)">EP4 商品</button>
  </div>
  <div class="ph-row">
    <button class="ph-btn on" id="phPre" onclick="selPh('pre')">前測</button>
    <button class="ph-btn" id="phPost" onclick="selPh('post')">後測</button>
  </div>
  <div style="font-size:9px;color:#333;" id="topInfo">待機</div>
  <div class="live"><div class="pulse"></div>LIVE</div>
</div>

<div class="body">
<div class="left">

  <!-- 當前測試店家 -->
  <div class="sec">
    <div class="slbl">目前測試對象</div>
    <div class="shop-sel-row">
      <select class="shop-sel" id="curShopSel">
        <option value="">— 選擇店家 —</option>
        <option>靜日香研</option><option>胖昇</option><option>新協泰米行</option>
        <option>九尖茶廠</option><option>波嶼</option><option>紙布家</option>
        <option>嘉禮慕華</option><option>馨眠</option><option>樸樂咖啡</option><option>安餃子</option>
      </select>
    </div>
    <div class="current-shop" id="curShopDisp">尚未選擇</div>
  </div>

  <!-- 投票輪次 -->
  <div class="sec">
    <div class="slbl">投票輪次</div>
    <div class="rs rs-idle" id="rdSt">尚未開始</div>
    <div class="rbtns">
      <button class="rbtn rb-go" onclick="startRound()">▶ 開始本輪投票</button>
      <button class="rbtn rb-stop" onclick="stopRound()">⏹ 結束本輪投票</button>
      <button class="rbtn rb-reset" onclick="resetRound()">↺ 清除重置</button>
    </div>
    <div style="margin-top:6px;display:grid;grid-template-columns:1fr 1fr;gap:4px;">
      <button class="rbtn" style="background:#1A3A5C;color:#7AB8F5;font-size:10px;" onclick="startToken()">🪙 EP2 籌碼投票</button>
      <button class="rbtn" style="background:#2A1A4A;color:#CC88FF;font-size:10px;" onclick="startRole()">🏷 EP4 五角色</button>
    </div>
  </div>

  <!-- 即時票數 -->
  <div class="sec">
    <div class="slbl">即時票數</div>
    <div class="sg">
      <div class="si"><div class="sn r" id="sR">0</div><div class="sl">🔴 紅</div></div>
      <div class="si"><div class="sn y" id="sY">0</div><div class="sl">🟡 黃</div></div>
      <div class="si"><div class="sn g" id="sG">0</div><div class="sl">🟢 綠</div></div>
    </div>
    <div class="rate-box"><div class="rb-num" id="sRate">—</div><div class="rb-sub">市場率</div></div>
    <div class="voted-ct">已投票：<span id="sTot">0</span> 人</div>
  </div>

  <!-- 本集各店家前後測結果 -->
  <div class="sec">
    <div class="slbl">本集各店家結果</div>
    <div class="store-results">
      <div class="sr-row sr-hd">
        <div class="sr-name">店家</div>
        <div class="sr-pre">前測</div>
        <div class="sr-post">後測</div>
        <div class="sr-diff">進步</div>
      </div>
      <div id="storeResultRows"></div>
    </div>
  </div>

  <!-- 搶答機制 -->
  <div class="sec">
    <div class="slbl">搶答機制</div>

    <!-- 秒數選擇 + 開放搶答 -->
    <div style="font-size:9px;color:#444;margin-bottom:4px;">搶答秒數</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:6px;">
      <button class="tp" id="bz5" onclick="setBuzzT(5,this)">5s</button>
      <button class="tp" id="bz8" onclick="setBuzzT(8,this)" style="background:#252525;color:#ccc;">8s</button>
      <button class="tp" id="bz10" onclick="setBuzzT(10,this)">10s</button>
      <button class="tp" id="bz15" onclick="setBuzzT(15,this)">15s</button>
    </div>
    <div style="font-size:10px;color:#7D1ADB;text-align:center;margin-bottom:4px;" id="buzzSecLabel">目前設定：10 秒</div>
    <button class="rbtn" id="buzzStartBtn"
      style="background:#7D1ADB;color:#fff;width:100%;padding:10px;font-size:12px;border:none;border-radius:5px;cursor:pointer;font-family:inherit;font-weight:700;margin-bottom:6px;"
      onclick="startBuzz()">⚡ 開放搶答</button>

    <!-- 搶答結果（即時顯示誰按了） -->
    <div style="font-size:9px;color:#444;margin-bottom:4px;">搶答結果（即時）</div>
    <div id="buzzResults" style="background:#1a1a1a;border-radius:5px;padding:6px;min-height:32px;margin-bottom:6px;font-size:11px;color:#888;">等待搶答中…</div>

    <!-- 本輪回答名單 -->
    <div style="font-size:9px;color:#444;margin-bottom:4px;">本輪回答名單</div>
    <div id="buzzRoundList" style="display:flex;flex-direction:column;gap:3px;margin-bottom:6px;"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:4px;">
      <select class="sel" id="buzzShopSel" style="font-size:10px;">
        <option value="">+ 選店家</option>
        <option>靜日香研</option><option>胖昇</option><option>新協泰米行</option>
        <option>九尖茶廠</option><option>波嶼</option><option>紙布家</option>
        <option>嘉禮慕華</option><option>馨眠</option><option>樸樂咖啡</option><option>安餃子</option>
      </select>
      <select class="sel" id="buzzTypeSel" style="font-size:10px;">
        <option value="搶答">搶答</option>
        <option value="評審指定">評審指定</option>
        <option value="機會卡">機會卡</option>
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:4px;">
      <button class="rbtn rb-stop" style="padding:7px;font-size:10px;" onclick="addBuzzShop()">＋ 加入名單</button>
      <button class="rbtn rb-reset" style="padding:7px;font-size:10px;" onclick="clearBuzzList()">清除名單</button>
    </div>
    <button class="rbtn" style="background:#1A5276;color:#7AB8F5;width:100%;padding:7px;font-size:10px;margin-top:2px;border:none;border-radius:4px;cursor:pointer;font-family:inherit;font-weight:700;"
      onclick="dispBuzzList()">→ 投影幕顯示名單</button>
  </div>

  <!-- 倒數計時 -->
  <div class="sec">
    <div class="slbl">倒數計時</div>
    <div class="td" id="tDisp">20</div>
    <div class="tpre">
      <button class="tp" onclick="setT(15)">15s</button>
      <button class="tp" onclick="setT(20)">20s</button>
      <button class="tp" onclick="setT(30)">30s</button>
      <button class="tp" onclick="setT(60)">60s</button>
      <button class="tp" onclick="setT(90)">90s</button>
      <button class="tp" onclick="setT(120)">2分</button>
      <button class="tp" onclick="setT(180)">3分</button>
      <button class="tp" onclick="setT(300)">5分</button>
    </div>
    <div class="tbtns">
      <button class="tbtn tb-go" id="tGo" onclick="startT()">▶ 開始</button>
      <button class="tbtn tb-pa" onclick="pauseT()">暫停</button>
      <button class="tbtn tb-rs" onclick="resetT()">重置</button>
    </div>
    <input class="tqin" id="tQ" placeholder="倒數說明文字">
  </div>

  <!-- 投影幕切換 -->
  <div class="sec">
    <div class="slbl">投影幕切換</div>
    <div class="dg">
      <button class="dbtn" onclick="disp('standby')">待機</button>
      <button class="dbtn" onclick="disp('timer')">倒數</button>
      <button class="dbtn" onclick="disp('buzz')">搶答畫面</button>
      <button class="dbtn" onclick="disp('buzzlist')">本輪名單</button>
      <button class="dbtn" onclick="disp('vpre')">前測結果</button>
      <button class="dbtn" onclick="disp('vpost')">後測結果</button>
      <button class="dbtn" onclick="dispCompare()">前後對比</button>
      <button class="dbtn" onclick="disp('scoreboard')">分數榜</button>
      <button class="dbtn" onclick="disp('token')">籌碼結果</button>
      <button class="dbtn" onclick="disp('role')">五角色結果</button>
      <button class="dbtn" onclick="dispUnlock()">解鎖資源</button>
      <button class="dbtn" onclick="disp('black')">黑屏</button>
    </div>
    <!-- 前後對比選店家 -->
    <div style="margin-top:6px;">
      <div style="font-size:9px;color:#444;margin-bottom:4px;">前後對比：選店家</div>
      <div class="cmp-sel-row">
        <select class="cmp-sel" id="cmpShopSel">
          <option value="">— 選店家 —</option>
          <option>靜日香研</option><option>胖昇</option><option>新協泰米行</option>
          <option>九尖茶廠</option><option>波嶼</option><option>紙布家</option>
          <option>嘉禮慕華</option><option>馨眠</option><option>樸樂咖啡</option><option>安餃子</option>
        </select>
        <button class="rbtn rb-stop" style="padding:5px 8px;font-size:10px;" onclick="dispCompare()">顯示</button>
      </div>
    </div>
  </div>

  <!-- 解鎖資源 -->
  <div class="sec">
    <div class="slbl">解鎖資源公布</div>
    <select class="sel" id="ulShop">
      <option>靜日香研</option><option>胖昇</option><option>新協泰米行</option>
      <option>九尖茶廠</option><option>波嶼</option><option>紙布家</option>
      <option>嘉禮慕華</option><option>馨眠</option><option>樸樂咖啡</option><option>安餃子</option>
    </select>
    <select class="sel" id="ulRes">
      <option value="📱 限動曝光｜100分">📱 限動曝光（100分）</option>
      <option value="📣 社群貼文介紹｜160分">📣 社群貼文介紹（160分）</option>
      <option value="🎬 影廳播映｜240分">🎬 影廳播映（240分）</option>
      <option value="🤝 實習生協作｜300分">🤝 實習生協作（300分）</option>
      <option value="🏆 戲院會員導流｜360分">🏆 戲院會員導流（360分）</option>
    </select>
    <button class="cb" onclick="dispUnlock()">→ 公布解鎖</button>
  </div>

  <!-- 店家分數 -->
  <div class="sec">
    <div class="slbl">店家分數</div>
    <div id="shopList"></div>
    <button class="cb" onclick="disp('scoreboard')" style="margin-top:5px;">→ 顯示分數榜</button>
  </div>

</div>

<!-- SEAT MAP -->
<div class="map-area">
  <div class="map-hd">

// ── BUILD MAP ──
function buildMap(){
  const wrap=document.getElementById('smap');
  wrap.innerHTML='';

  // 欄號標示列
  const lblRow=document.createElement('div');
  lblRow.className='col-lbl-row';
  const offset=document.createElement('div');
  offset.className='col-lbl-offset';
  lblRow.appendChild(offset);
  for(let c=1;c<=30;c++){
    const lbl=document.createElement('div');
    const showNums=[1,5,10,11,12,15,18,19,20,25,27,30];
    lbl.className=showNums.includes(c)?'col-lbl':'col-lbl-ph';
    if(showNums.includes(c)) lbl.textContent=c;
    lblRow.appendChild(lbl);
  }
  wrap.appendChild(lblRow);

  // 每排
  for(let r=8;r>=1;r--){
    const rowEl=document.createElement('div');
    rowEl.className='s-row';
    const rnum=document.createElement('div');
    rnum.className='rnum';rnum.textContent=r;
    rowEl.appendChild(rnum);

    // 建立欄位對應
    const colMap={};
    SEAT_DATA[r].seats.forEach(s=>colMap[s.c]=s);

    for(let c=1;c<=30;c++){
      const seatDef=colMap[c];
      const el=document.createElement('div');
      if(seatDef){
        el.className='seat '+(seatDef.g?'gray':'idle');
        el.id='sc_'+seatDef.id.replace(/-/g,'_');
        el.title=seatDef.id;
        el.textContent=seatDef.id.split('-')[1];
        if(!seatDef.g) el.onclick=e=>openMV(seatDef.id,e);
      } else {
        el.className='seat-ph';
      }
      rowEl.appendChild(el);
    }
    wrap.appendChild(rowEl);
  }
}

// ── MANUAL VOTE ──
function openMV(sid,e){
  mvTarget=sid;
  const pop=document.getElementById('mvpop');
  pop.classList.add('on');
  pop.style.left=(e.pageX-10)+'px';
  pop.style.top=(e.pageY-55)+'px';
}
function manualVote(color){
  if(!mvTarget)return;
  const key=mvTarget.replace(/-/g,'_');
  const el=document.getElementById('sc_'+key);
  if(el){
    el.className='seat'+(color==='clear'?' idle':' voted-'+color);
  }
  if(color!=='clear'&&roundId){
    fetch(`${DB}/votes/${roundId}/${key}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({color,seat:mvTarget,ts:Date.now(),manual:true})});
  } else if(color==='clear'&&roundId){
    fetch(`${DB}/votes/${roundId}/${key}.json`,{method:'DELETE'});
  }
  document.getElementById('mvpop').classList.remove('on');
  mvTarget=null;
}
document.addEventListener('click',e=>{
  if(!e.target.closest('#mvpop')&&!e.target.classList.contains('seat'))
    document.getElementById('mvpop').classList.remove('on');
});

// ── REFRESH MAP ──
function refreshMap(){
  document.querySelectorAll('.seat.idle,.seat.voted-red,.seat.voted-yellow,.seat.voted-green').forEach(el=>{
    el.classList.remove('voted-red','voted-yellow','voted-green');
    el.classList.add('idle');
  });
  Object.entries(votes).forEach(([key,data])=>{
    const el=document.getElementById('sc_'+key);
    if(el){el.classList.remove('idle','voted-red','voted-yellow','voted-green');el.classList.add('voted-'+data.color);}
  });
}

// ── STATS ──
function calcRate(vs){
  let r=0,y=0,g=0;
  Object.values(vs).forEach(v=>{if(v.color==='red')r++;else if(v.color==='yellow')y++;else if(v.color==='green')g++;});
  const tot=r+y+g;
  const rate=tot>0?Math.round((y+g*2)/(tot*2)*1000)/10:null;
  return {r,y,g,tot,rate};
}
function updStats(){
  const {r,y,g,tot,rate}=calcRate(votes);
  document.getElementById('sR').textContent=r;
  document.getElementById('sY').textContent=y;
  document.getElementById('sG').textContent=g;
  document.getElementById('sTot').textContent=tot;
  document.getElementById('sRate').textContent=rate!==null?rate+'%':'—';
  // push to display (localStorage + Firebase)
  const shop=document.getElementById('curShopSel').value;
  const vdData={r,y,g,tot,rate,ep:curEP,ph:curPh,shop,ts:Date.now()};
  try{localStorage.setItem('vd',JSON.stringify(vdData));}catch(e){}
  // 同步到 Firebase 讓另一台電腦的 display.html 也能即時更新票數
  try{
    fetch(`${DB}/display/vd.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(JSON.stringify(vdData))});
  }catch(e){}
}

// ── STORE RESULTS TABLE ──
function updateStoreResultRows(){
  const wrap=document.getElementById('storeResultRows');
  wrap.innerHTML='';
  SHOPS.forEach(s=>{
    const res=storeResults[s];
    if(res.pre===null&&res.post===null)return;
    const row=document.createElement('div');
    row.className='sr-row';
    const nm=document.createElement('div');nm.className='sr-name';nm.textContent=s;
    const pre=document.createElement('div');pre.className='sr-pre';pre.textContent=res.pre!==null?res.pre+'%':'—';
    const post=document.createElement('div');post.className='sr-post';post.textContent=res.post!==null?res.post+'%':'—';
    const diff=document.createElement('div');
    if(res.pre!==null&&res.post!==null){
      const d=Math.round((res.post-res.pre)*10)/10;
      diff.className='sr-diff '+(d>=0?'up':'down');
      diff.textContent=(d>=0?'+':'')+d+'%';
    } else {
      diff.className='sr-diff';diff.textContent='—';
    }
    row.appendChild(nm);row.appendChild(pre);row.appendChild(post);row.appendChild(diff);
    wrap.appendChild(row);
  });
}

// ── POLL ──
async function poll(){
  if(!roundId)return;
  try{
    const res=await fetch(`${DB}/votes/${roundId}.json`);
    const d=await res.json();
    votes=d||{};
    refreshMap();updStats();
  }catch(e){}
}

// ── SHOP SELECTOR ──
document.getElementById('curShopSel').addEventListener('change',function(){
  const v=this.value;
  document.getElementById('curShopDisp').textContent=v||'尚未選擇';
  try{localStorage.setItem('curShop',v);}catch(e){}
});

// ── EP/PHASE ──
function selEP(ep){
  curEP=ep;[1,2,3,4].forEach(i=>document.getElementById('ep'+i+'t').classList.toggle('on',i===ep));
  buildShopList();
  try{localStorage.setItem('displayEP',String(ep));}catch(e){}
  // 推送 EP 更新到 Firebase，讓 display 待機畫面即時更新
  pushEPUpdate();
}

function pushEPUpdate(){
  try{
    fetch(DB+'/display/ep.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(String(curEP))});
    fetch(DB+'/display/ts.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(Date.now())});
  }catch(e){}
}
function selPh(ph){
  curPh=ph;
  document.getElementById('phPre').classList.toggle('on',ph==='pre');
  document.getElementById('phPost').classList.toggle('on',ph==='post');
  try{localStorage.setItem('displayPh',ph);}catch(e){}
}

// ── ROUND ──
// EP2 籌碼投票
async function startToken(){
  const shop=document.getElementById('curShopSel').value;
  if(!curEP===2&&!confirm('籌碼投票通常在EP2使用，確定要開始？'))return;
  roundId='ep2_token_'+Date.now();
  votes={};refreshMap();updStats();
  const shops=['靜日香研','胖昇','新協泰米行','九尖茶廠','波嶼','紙布家','嘉禮慕華','馨眠','樸樂咖啡','安餃子'];
  try{
    await fetch(`${DB}/round.json`,{method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({active:true,id:roundId,ep:'ep2',phase:'token',shops,startedAt:Date.now()})});
    setStatus(true,'EP2 籌碼投票');
    if(!pollT)pollT=setInterval(poll,1800);
  }catch(e){alert('啟動失敗');}
}

// EP4 五角色投票
async function startRole(){
  const shop=document.getElementById('curShopSel').value;
  if(!shop){alert('請先選擇目前測試的店家！');return;}
  roundId='ep4_role_'+shop.replace(/[^a-z0-9]/gi,'')+'_'+Date.now();
  votes={};refreshMap();updStats();
  try{
    await fetch(`${DB}/round.json`,{method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({active:true,id:roundId,ep:'ep4',phase:'role',shop,startedAt:Date.now()})});
    setStatus(true,'EP4 五角色 · '+shop);
    if(!pollT)pollT=setInterval(poll,1800);
  }catch(e){alert('啟動失敗');}
}

async function startRound(){
  const shop=document.getElementById('curShopSel').value;
  if(!shop){alert('請先選擇目前測試的店家！');return;}
  roundId='ep'+curEP+'_'+curPh+'_'+shop.replace(/[^a-z0-9]/gi,'')+'_'+Date.now();
  votes={};refreshMap();updStats();
  try{
    await fetch(`${DB}/round.json`,{method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({active:true,id:roundId,ep:'ep'+curEP,phase:curPh,shop,startedAt:Date.now()})});
    setStatus(true,shop);
    if(!pollT)pollT=setInterval(poll,1800);
  }catch(e){alert('啟動失敗，請檢查網路');}
}
async function stopRound(){
  const shop=document.getElementById('curShopSel').value;
  // 判斷是否為特殊模式
  const isToken=roundId&&roundId.startsWith('ep2_token');
  const isRole=roundId&&roundId.startsWith('ep4_role');

  if(!isToken&&!isRole&&shop){
    const {rate}=calcRate(votes);
    if(rate!==null){
      if(curPh==='pre') storeResults[shop].pre=rate;
      else storeResults[shop].post=rate;
      updateStoreResultRows();
      try{localStorage.setItem('storeResults',JSON.stringify(storeResults));}catch(e){}
    }
  }

  // 記錄特殊輪次 ID 供 display 使用
  if(isToken){
    try{await fetch(`${DB}/display/tokenRound.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(roundId)});}catch(e){}
  }
  if(isRole){
    try{
      await fetch(`${DB}/display/roleRound.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(roundId)});
      await fetch(`${DB}/display/roleShop.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(shop)});
    }catch(e){}
  }

  try{await fetch(`${DB}/round.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({active:false,id:roundId})});}catch(e){}
  setStatus(false,'已結束');
}
async function resetRound(){
  if(!confirm('確定清除票數並重置？'))return;
  votes={};roundId=null;refreshMap();updStats();
  try{await fetch(`${DB}/round.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({active:false})});}catch(e){}
  setStatus(false,'已重置');
}
function setStatus(live,msg){
  const el=document.getElementById('rdSt');
  if(live){
    el.className='rs rs-live';
    el.textContent='EP'+curEP+' '+(curPh==='pre'?'前測':'後測')+' · '+msg+' ●';
    document.getElementById('topInfo').textContent=msg+' 投票中';
  } else {
    el.className='rs rs-idle';
    el.textContent=msg||'尚未開始';
    document.getElementById('topInfo').textContent=msg||'待機';
  }
}

// ── TIMER ──
function setT(s){pauseT();tSec=tTotal=s;updT();}
function startT(){
  if(tRun)return;tRun=true;document.getElementById('tGo').textContent='進行中…';
  disp('timer');
  tIv=setInterval(()=>{if(tSec<=0){clearInterval(tIv);tRun=false;document.getElementById('tGo').textContent='▶ 開始';return;}tSec--;updT();syncT();},1000);
}
function pauseT(){clearInterval(tIv);tRun=false;document.getElementById('tGo').textContent='▶ 開始';}
function resetT(){pauseT();tSec=tTotal;updT();}
function updT(){
  const m=Math.floor(tSec/60),s=tSec%60;
  const str=m>0?m+':'+(s<10?'0':'')+s:String(s);
  const pct=tTotal>0?tSec/tTotal:1,cls=pct<=.2?'d':pct<=.4?'w':'';
  document.getElementById('tDisp').textContent=str;
  document.getElementById('tDisp').className='td'+(cls?' '+cls:'');
}
function syncT(){
  const m=Math.floor(tSec/60),s=tSec%60;
  const str=m>0?m+':'+(s<10?'0':'')+s:String(s);
  const pct=tTotal>0?tSec/tTotal:1;
  const q=document.getElementById('tQ').value;
  const tData={str,pct,q,ts:Date.now()};
  try{localStorage.setItem('timer',JSON.stringify(tData));}catch(e){}
  try{fetch(`${DB}/display/timer.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(JSON.stringify(tData))});}catch(e){}
}

// ── DISPLAY ── 同時寫 localStorage 和 Firebase
async function pushDisplay(data){
  const now=Date.now();
  // localStorage (同台電腦用)
  try{
    Object.entries(data).forEach(([k,v])=>localStorage.setItem(k,typeof v==='object'?JSON.stringify(v):String(v)));
    localStorage.setItem('displayTs',String(now));
  }catch(e){}
  // Firebase (跨電腦用)
  try{
    const payload={
      screen: data.displayScreen||'standby',
      ep: data.displayEP||'1',
      ph: data.displayPh||'pre',
      shop: data.curShop||'',
      cmpShop: data.compareShop||'',
      cmpData: data.compareData||'',
      scores: data.shopScores||'',
      unlock: data.unlockInfo||'',
      vd: localStorage.getItem('vd')||'',
      ts: now
    };
    const res=await fetch(`${DB}/display.json`,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    if(!res.ok) console.log('Firebase error:',res.status);
  }catch(e){console.log('Firebase push error:',e);}
}

function disp(screen){
  const shop=document.getElementById('curShopSel').value;
  const ul={shop:document.getElementById('ulShop').value,res:document.getElementById('ulRes').value};
  const sc=shopScores[ul.shop]||[0,0,0,0];
  ul.tot=sc.reduce((a,b)=>a+(+b||0),0);
  pushDisplay({
    displayScreen:screen,
    displayEP:String(curEP),
    displayPh:curPh,
    curShop:shop,
    shopScores:JSON.stringify(shopScores),
    unlockInfo:JSON.stringify(ul),
    storeResults:JSON.stringify(storeResults),
    displayTs:String(Date.now()),
  });
}

function dispCompare(){
  const shop=document.getElementById('cmpShopSel').value||document.getElementById('curShopSel').value;
  if(!shop){alert('請選擇要對比的店家');return;}
  const res=storeResults[shop]||{pre:null,post:null};
  pushDisplay({
    displayScreen:'compare',
    displayEP:String(curEP),
    compareShop:shop,
    cmpShop:shop,
    compareData:JSON.stringify(res),
    cmpData:JSON.stringify(res),
    storeResults:JSON.stringify(storeResults),
  });
}

function dispUnlock(){
  disp('unlock');
}

  SHOPS.forEach(s=>{
    const row=document.createElement('div');row.className='shr';
    const nm=document.createElement('div');nm.className='shnm';nm.textContent=s;
    const inp=document.createElement('input');inp.className='shin';inp.type='number';inp.min='0';inp.max='130';inp.value=shopScores[s][curEP-1]||0;
    const tot=document.createElement('div');tot.className='shtot';tot.textContent=shopScores[s].reduce((a,b)=>a+(+b||0),0)||0;
    inp.oninput=()=>{shopScores[s][curEP-1]=parseInt(inp.value)||0;tot.textContent=shopScores[s].reduce((a,b)=>a+(+b||0),0)||0;try{localStorage.setItem('shopScores',JSON.stringify(shopScores));}catch(e){}};
    row.appendChild(nm);row.appendChild(inp);row.appendChild(tot);wrap.appendChild(row);
  });
}

// ── 搶答機制 ──
let buzzSec=10, buzzTotal=10, buzzRun=false, buzzIv=null;
let buzzList=[];
let buzzRoundId=null;

function setBuzzT(s, btn){
  buzzSec=buzzTotal=s;
  // 更新按鈕樣式
  ['bz5','bz8','bz10','bz15'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){el.style.background='#1a1a1a';el.style.color='#666';}
  });
  if(btn){btn.style.background='#252525';btn.style.color='#ccc';}
  document.getElementById('buzzSecLabel').textContent='目前設定：'+s+' 秒';
}

function startBuzz(){
  if(buzzRun) return;
  buzzRun=true;
  buzzSec=buzzTotal;
  // 建立新的搶答輪次 ID，讓 vote.html 知道搶答開始
  buzzRoundId='buzz_'+Date.now();
  const btn=document.getElementById('buzzStartBtn');
  btn.textContent='搶答中… '+buzzSec+'s';
  btn.style.background='#E74C3C';
  // 清空舊的搶答結果
  document.getElementById('buzzResults').textContent='搶答中…';

  // 推送到 Firebase：搶答模式
  const payload={
    active:true, id:buzzRoundId,
    ep:'ep'+curEP, phase:'buzz',
    totalSec:buzzTotal,
    startedAt:Date.now()
  };
  fetch(`${DB}/round.json`,{method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)});

  // 切換投影幕到搶答畫面
  disp('buzz');

  // 開始倒數
  syncBuzz(buzzSec, buzzTotal, '搶！搶！搶！');
  buzzIv=setInterval(()=>{
    if(buzzSec<=0){
      clearInterval(buzzIv); buzzRun=false;
      btn.textContent='⚡ 開放搶答';
      btn.style.background='#7D1ADB';
      syncBuzz(0, buzzTotal, '搶答結束！');
      // 結束搶答
      fetch(`${DB}/round.json`,{method:'PUT',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({active:false,id:buzzRoundId,phase:'buzz'})});
      return;
    }
    buzzSec--;
    syncBuzz(buzzSec, buzzTotal, '搶！搶！搶！');
    const btn2=document.getElementById('buzzStartBtn');
    if(btn2) btn2.textContent='搶答中… '+buzzSec+'s';
    // 讀取即時搶答結果
    pollBuzzResults();
  },1000);
}

function syncBuzz(sec, total, label){
  const pct=total>0?sec/total:0;
  const m=Math.floor(sec/60),s=sec%60;
  const str=m>0?m+':'+(s<10?'0':'')+s:String(sec);
  const tData={str,pct,q:label,ts:Date.now(),isBuzz:true,buzzSec:sec};
  try{localStorage.setItem('timer',JSON.stringify(tData));}catch(e){}
  try{fetch(`${DB}/display/timer.json`,{
    method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(JSON.stringify(tData))
  });}catch(e){}
}

async function pollBuzzResults(){
  if(!buzzRoundId) return;
  try{
    const res=await fetch(`${DB}/votes/${buzzRoundId}.json`);
    const d=await res.json();
    if(!d){return;}
    const entries=Object.entries(d).sort((a,b)=>a[1].ts-b[1].ts);
    const wrap=document.getElementById('buzzResults');
    if(!wrap) return;
    if(entries.length===0){wrap.textContent='等待搶答中…';return;}
    wrap.innerHTML='';
    entries.forEach(([key,v],i)=>{
      const row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;gap:6px;padding:3px 0;';
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'　';
      row.innerHTML=`<span style="font-size:13px;">${medal}</span><span style="font-size:12px;color:#ccc;font-weight:700;">${v.shop||v.seat||key}</span><span style="font-size:10px;color:#555;">${new Date(v.ts).toLocaleTimeString()}</span>`;
      wrap.appendChild(row);
    });
  }catch(e){}
}

function addBuzzShop(){
  const shop=document.getElementById('buzzShopSel').value;
  const type=document.getElementById('buzzTypeSel').value;
  if(!shop) return;
  if(buzzList.find(b=>b.shop===shop)) return;
  buzzList.push({shop,type});
  renderBuzzList();
  pushBuzzList();
  document.getElementById('buzzShopSel').value='';
}

function renderBuzzList(){
  const wrap=document.getElementById('buzzRoundList');
  wrap.innerHTML='';
  buzzList.forEach((b,i)=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:4px;padding:3px 6px;background:#1a1a1a;border-radius:4px;';
    const tc={'搶答':'#E74C3C','評審指定':'#3498DB','機會卡':'#9B59B6'}[b.type]||'#888';
    row.innerHTML=`<span style="font-size:10px;color:${tc};font-weight:700;min-width:52px;">${b.type}</span><span style="font-size:11px;color:#ccc;flex:1;">${b.shop}</span><span style="font-size:10px;color:#444;cursor:pointer;" onclick="removeBuzzShop(${i})">✕</span>`;
    wrap.appendChild(row);
  });
}

function removeBuzzShop(i){
  buzzList.splice(i,1);
  renderBuzzList();
  pushBuzzList();
}

function clearBuzzList(){
  buzzList=[];
  renderBuzzList();
  pushBuzzList();
}

function pushBuzzList(){
  try{localStorage.setItem('buzzList',JSON.stringify(buzzList));}catch(e){}
  try{fetch(`${DB}/display/buzzList.json`,{
    method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(JSON.stringify(buzzList))
  });}catch(e){}
}

function dispBuzzList(){
  // 直接把 buzzList 包進 pushDisplay payload
  const shop=document.getElementById('curShopSel').value;
  const ul={shop:document.getElementById('ulShop').value,res:document.getElementById('ulRes').value};
  const sc=shopScores[ul.shop]||[0,0,0,0];
  ul.tot=sc.reduce((a,b)=>a+(+b||0),0);
  const now=Date.now();
  const payload={
    screen:'buzzlist',
    ep:String(curEP),
    ph:curPh,
    shop,
    scores:JSON.stringify(shopScores),
    unlock:JSON.stringify(ul),
    buzzList:JSON.stringify(buzzList),
    vd:localStorage.getItem('vd')||'',
    ts:now,
    displayTs:String(now),
  };
  // localStorage
  try{
    Object.entries(payload).forEach(([k,v])=>localStorage.setItem(k==='screen'?'displayScreen':k==='ep'?'displayEP':k==='ph'?'displayPh':k,v));
    localStorage.setItem('displayTs',String(now));
  }catch(e){}
  // Firebase
  try{
    fetch(`${DB}/display.json`,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
  }catch(e){}
}


buildMap();buildShopList();
if(!pollT)pollT=setInterval(poll,1800);
</script>
