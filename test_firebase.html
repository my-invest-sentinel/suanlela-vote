<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Firebase 測試 v2</title>
<style>
body{font-family:sans-serif;padding:30px;background:#111;color:#eee;}
button{padding:12px 24px;margin:8px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:700;}
.btn-write{background:#1A6B35;color:#fff;}
.btn-read{background:#1A3A5C;color:#fff;}
.btn-watch{background:#7A3A00;color:#fff;}
.btn-clear{background:#333;color:#aaa;}
pre{background:#1a1a1a;padding:16px;border-radius:8px;margin-top:12px;white-space:pre-wrap;word-break:break-all;font-size:12px;max-height:400px;overflow:auto;}
.ok{color:#27AE60;font-weight:700;}
.err{color:#E74C3C;font-weight:700;}
.info{color:#7AB8F5;}
</style>
</head>
<body>
<h2>Firebase 即時監看</h2>
<div>
  <button class="btn-read" onclick="readDisplay()">讀取 /display 現在的值</button>
  <button class="btn-watch" onclick="startWatch()">每秒自動監看</button>
  <button class="btn-clear" onclick="clearLog()">清除</button>
</div>
<pre id="log">點按鈕開始...</pre>

<script>
const DB='https://suanlela-vote-default-rtdb.firebaseio.com';
let watchT=null;

function log(msg,cls=''){
  const el=document.getElementById('log');
  el.innerHTML=`<span class="${cls}">${new Date().toLocaleTimeString()} ${msg}</span>\n`+el.innerHTML;
}

async function readDisplay(){
  try{
    const res=await fetch(`${DB}/display.json`);
    const d=await res.json();
    log('Firebase /display 的值：\n'+JSON.stringify(d,null,2),'info');
  }catch(e){log('錯誤：'+e.message,'err');}
}

function startWatch(){
  if(watchT){clearInterval(watchT);watchT=null;log('停止監看');return;}
  log('開始每秒監看...');
  watchT=setInterval(readDisplay,1000);
}

function clearLog(){document.getElementById('log').textContent='';}
</script>
</body>
</html>
